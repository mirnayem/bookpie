services:
  postgres:
    image: postgres:16-alpine
    container_name: bookpie-postgres
    environment:
      POSTGRES_DB: bookpie
      POSTGRES_USER: bookpie
      POSTGRES_PASSWORD: bookpie
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookpie -d bookpie"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bookpie-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: bookpie-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: bookpie-master-key
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: bookpie-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bookpie
      MINIO_ROOT_PASSWORD: bookpie-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  nats:
    image: nats:2.11-alpine
    container_name: bookpie-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: bookpie-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.0.1
    container_name: bookpie-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: bookpie-otel-collector
    command: ["--config=/etc/otel-collector.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otel-collector.yml:ro

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
  nats_data:
  prometheus_data:
  grafana_data:
